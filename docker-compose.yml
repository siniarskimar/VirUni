services:
  postgres:
    image: postgres
    environment:
      - POSTGRES_DB=viruni
      - POSTGRES_USER=${VIRUNI_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${VIRUNI_DB_PASSWORD:-postgres}
    ports:
      - ${VIRUNI_DB_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test:
        - "CMD-SHELL"
        - "sh -c 'pg_isready -U ${VIRUNI_DB_USER:-postgres} -d ${VIRUNI_DB_PASSWORD:-postgres}'"
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s  

  backend:
    restart: on-failure
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOSTNAME=postgres
    ports:
      - ${VIRUNI_BACKEND_PORT:-8080}:8080
    depends_on:
      - postgres

  frontend:
    restart: on-failure
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - ${VIRUNI_FRONTEND_PORT:-4200}:4200
    command: ["pnpm", "run", "start", "--host", "0.0.0.0", "--poll", "2000"]

volumes:
  postgres_data:
