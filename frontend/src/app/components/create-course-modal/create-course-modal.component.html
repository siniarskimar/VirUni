<h2 class="title is-2">Create course</h2>

<div class="field">
    <label class="label">Name: </label>
    <input type="text" class="input" [value]="this.name()" (change)="this.name.set(name.value)" #name>
</div>
<div class="field">
    <label class="label">Description:</label>
    <textarea class="textarea" (change)="this.description.set(desc.value)" #desc>{{this.description()}}</textarea>
</div>

<button class="button" (click)="onCreate()">Create</button>
